<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League of Legends Build Guides</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .search-bar { margin: 20px; }
        .build-card { border: 1px solid #ccc; border-radius: 8px; padding: 10px; margin: 10px; width: 200px; display: inline-block; vertical-align: top; }
        .build-list { display: flex; flex-wrap: wrap; }
    </style>
</head>
<body>
    <h1>League of Legends Build Guides</h1>
    <div class="search-bar">
        <input type="text" placeholder="Search for builds..." />
        <button>Search</button>
    </div>
    <div class="build-list">
        <div class="build-card">
            <h2>Talon Jungle</h2>
            <p><strong>Runes:</strong> Dark Harvest, Sudden Impact, Eyeball Collection, Ravenous Hunter</p>
            <p><strong>Items:</strong> Yomu's Ghostblade, Duskblade of Draktharr, Guardian Angel</p>
            <p><strong>Strategy:</strong> Focus on ganking and picking off squishy champions in the early game.</p>
        </div>
    </div>
</body>
</html>
