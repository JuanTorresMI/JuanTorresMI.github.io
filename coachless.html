---
layout: coachless
title: Coachless Dashboard
---

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; min-height: 100vh; }

.upload-screen { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 60px); flex-direction: column; gap: 16px; }
.upload-screen h1 { color: #e8e8ff; font-size: 32px; font-weight: 800; }
.upload-screen p { color: #6666aa; font-size: 14px; }
.upload-btn { padding: 14px 40px; background: #3a3a6e; color: #e8e8ff; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 600; border: 2px solid #5555aa; transition: all 0.2s; display: inline-block; }
.upload-btn:hover { background: #4a4a8e; border-color: #7777cc; }
.upload-btn input { display: none; }

.app { max-width: 1500px; margin: 0 auto; padding: 0 16px 40px; }
.cl-header { padding: 16px 0 12px; border-bottom: 1px solid #1a1a3e; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.cl-header h1 { color: #e8e8ff; font-size: 22px; font-weight: 800; font-family: 'DM Sans', sans-serif; }
.cl-header .sub { color: #6666aa; font-size: 12px; }
.reload-btn { padding: 6px 16px; background: #2a2a4e; color: #aab; border-radius: 6px; cursor: pointer; font-size: 11px; border: 1px solid #3a3a6e; font-family: inherit; }

.cl-tabs { display: flex; gap: 6px; padding: 14px 0; border-bottom: 1px solid #1a1a3e; flex-wrap: wrap; }
.cl-tab { padding: 7px 18px; border-radius: 6px; border: 2px solid transparent; background: #2a2a4e; color: #9999bb; cursor: pointer; font-size: 13px; font-weight: 400; font-family: inherit; transition: all 0.15s; }
.cl-tab.active { border-color: #7c6ef0; background: #3a3a6e; color: #e8e8ff; font-weight: 700; }
.cl-tab:hover { background: #33335e; }

.dims { display: flex; flex-wrap: wrap; gap: 18px; padding: 16px 0 8px; }
.dim-group label { font-size: 10px; color: #6666aa; text-transform: uppercase; letter-spacing: 1.2px; display: block; margin-bottom: 5px; }
.dim-options { display: flex; gap: 4px; flex-wrap: wrap; }
.pill { padding: 6px 14px; border-radius: 6px; border: 2px solid transparent; background: #2a2a4e; color: #9999bb; cursor: pointer; font-size: 12px; font-weight: 400; font-family: inherit; transition: all 0.12s; }
.pill.active { border-color: #7c6ef0; background: #3a3a6e; color: #e8e8ff; font-weight: 700; }
.pill:hover { background: #33335e; }

.table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid #2a2a4e; margin-top: 8px; max-height: 75vh; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { padding: 9px 10px; background: #1a1a2e; color: #aab; cursor: pointer; text-align: left; border-bottom: 2px solid #2a2a5e; white-space: nowrap; user-select: none; font-size: 11px; font-weight: 600; position: sticky; top: 0; z-index: 1; font-family: inherit; }
th:hover { color: #ddf; }
td { padding: 6px 10px; border-bottom: 1px solid #1a1a3e; white-space: nowrap; font-size: 12px; color: #ccc; }
tr:nth-child(even) { background: #12121e; }
tr:nth-child(odd) { background: #16162a; }
tr:hover { background: #1e1e3a !important; }
.mono { font-family: 'JetBrains Mono', monospace; }
.bold { font-weight: 700; color: #e8e8ff; }
.count { color: #6666aa; font-size: 11px; margin: 8px 0 4px; }
.section-title { color: #e8e8ff; font-size: 15px; font-weight: 700; margin: 20px 0 10px; }
.wpa-pos { color: #44dd77; }
.wpa-neg { color: #dd6644; }
.wpa-high { color: #00ff88; }
.wpa-low { color: #ff4444; }
</style>

<div id="root"></div>

{% raw %}
<script>
let DATA = null;
let NAMES = {};
let SPELLS_MAP = {};
const SPELL_FALLBACK = {1:'Cleanse',3:'Exhaust',4:'Flash',6:'Ghost',7:'Heal',11:'Smite',12:'Teleport',14:'Ignite',21:'Barrier'};

let state = {
  tab: 'solutions',
  filters: { damage:'Mixed', tankiness:'Balanced', cc:'Normal CC', state:'Even', gold:'Gold Even' },
  sortBy: 'fullScore',
  sort: { col: null, dir: 'desc' },
  guideKeystone: null, guideSlot: 'All'
};

const DIMS = {
  damage:    { label:'Enemy Damage',    options:['Physical','Mixed','Magic'] },
  tankiness: { label:'Enemy Tankiness', options:['Squishy','Balanced','Tanky'] },
  cc:        { label:'Enemy CC',        options:['Low CC','Normal CC','High CC'] },
  state:     { label:'Game State',      options:['Even','Ahead','Behind'] },
  gold:      { label:'Gold State',      options:['Gold Even','Gold Ahead','Gold Behind'] },
};

function buildNames() {
  NAMES = {}; SPELLS_MAP = {...SPELL_FALLBACK};
  if (DATA.nameMaps?.items) for (const [k,v] of Object.entries(DATA.nameMaps.items)) NAMES[k] = v;
  if (DATA.nameMaps?.spells) for (const [k,v] of Object.entries(DATA.nameMaps.spells)) SPELLS_MAP[k] = v;
  (DATA.explorer?.conditionalData||[]).forEach(r => { if (r.id && r.name) NAMES[r.id] = r.name; });
  for (const d of Object.values(DATA.explorer?.perKeystone||{}))
    for (const a of d.archetypes||[]) {
      for (const key of ['1st','2nd']) if (a[key]?.id) NAMES[a[key].id] = a[key].name;
      for (const l of ['3rd_options','4th_options','boots_options','starter_options','3rd_all','4th_all','boots_all'])
        for (const o of (a[l]||[])) if (o.id) NAMES[o.id] = o.name;
    }
  (DATA.explorer?.spells||[]).forEach(s => { if (s.id && s.name) SPELLS_MAP[s.id] = s.name; });
}
function iN(id) { return NAMES[id]||NAMES[String(id)]||`Item #${id}`; }
function sN(id) { return SPELLS_MAP[id]||SPELLS_MAP[String(id)]||`Spell #${id}`; }

function wpaFmt(v) {
  if (v===null||v===undefined||v==='') return '';
  const n = typeof v==='number'?v:parseFloat(v);
  if (isNaN(n)) return String(v);
  const cls = n>3?'wpa-high':n>0?'wpa-pos':n>-3?'wpa-neg':'wpa-low';
  return `<span class="mono ${cls}">${n>0?'+':''}${n.toFixed(2)}</span>`;
}

function sortRows(rows, col, dir) {
  if (col===null) return rows;
  return [...rows].sort((a,b) => {
    let av=a[col], bv=b[col];
    if (typeof av==='number'&&typeof bv==='number') return dir==='desc'?bv-av:av-bv;
    return dir==='desc'?String(bv||'').localeCompare(String(av||'')):String(av||'').localeCompare(String(bv||''));
  });
}

function makeTable(headers, rows, wpaIdxs=[]) {
  const sorted = sortRows(rows, state.sort.col, state.sort.dir);
  let h = '<div class="table-wrap"><table><thead><tr>';
  headers.forEach((hdr,i) => { const a=state.sort.col===i?(state.sort.dir==='desc'?' ▼':' ▲'):''; h+=`<th onclick="clickSort(${i})">${hdr}${a}</th>`; });
  h += '</tr></thead><tbody>';
  if (!sorted.length) h += `<tr><td colspan="${headers.length}" style="text-align:center;color:#6666aa;padding:20px;">No data</td></tr>`;
  sorted.forEach(row => { h+='<tr>'; row.forEach((c,ci) => { const w=wpaIdxs.includes(ci)&&typeof c==='number'?wpaFmt(c):(c??''); h+=`<td${ci===0?' class="bold"':''}>${w}</td>`; }); h+='</tr>'; });
  h += '</tbody></table></div>';
  return h;
}

function clickSort(c) { if(state.sort.col===c) state.sort.dir=state.sort.dir==='desc'?'asc':'desc'; else{state.sort.col=c;state.sort.dir='desc';} render(); }
function setFilter(d,v) { state.filters[d]=v; state.sort={col:null,dir:'desc'}; render(); }
function setTab(t) { state.tab=t; state.sort={col:null,dir:'desc'}; render(); }
function setGuideFilter(k,v) { state[k]=v; state.sort={col:null,dir:'desc'}; render(); }
function setSortBy(v) { state.sortBy=v; state.sort={col:null,dir:'desc'}; render(); }

function render() {
  const root = document.getElementById('root');
  if (!DATA) { root.innerHTML = `<div class="upload-screen"><h1>Coachless Toolkit</h1><p>Upload the JSON from the toolkit</p><label class="upload-btn">Upload JSON<input type="file" accept=".json" onchange="loadFile(event)"></label></div>`; return; }
  const m = DATA.meta||{};
  const tabs = [['solutions','Solutions'],['solver','Scenario Solver'],['archetypes','Archetypes'],['runes','Rune Pages'],['items','Items'],['spells','Spells'],['guide','Guide']];
  let h = '<div class="app">';
  h += `<div class="cl-header"><div><h1>${m.champion||'?'}</h1><span class="sub">${m.role||''} &bull; Patch ${m.patch||'?'} &bull; ${(m.ranks||[]).join(', ')}</span></div><label class="reload-btn">Load file<input type="file" accept=".json" onchange="loadFile(event)" style="display:none"></label></div>`;
  h += '<div class="cl-tabs">'; tabs.forEach(([id,l]) => { h+=`<button class="cl-tab${state.tab===id?' active':''}" onclick="setTab('${id}')">${l}</button>`; }); h+='</div>';
  const fn = {solutions:renderSolutions,solver:renderSolver,archetypes:renderArchetypes,runes:renderRunes,items:renderItems,spells:renderSpells,guide:renderGuide};
  h += (fn[state.tab]||renderSolver)();
  h += '</div>';
  root.innerHTML = h;
}

function renderSolutions() {
  const sols = DATA.solutions || [];
  if (!sols.length) return '<p style="color:#6666aa;margin:16px 0;">No solutions. Re-run toolkit with latest version.</p>';

  let h = '<div class="section-title">Recommended Builds</div>';
  h += '<p style="color:#8888bb;font-size:12px;margin-bottom:12px;">Each build averaged across all 243 scenario combos. Consistently strong builds rise to top. Labels mark where each build is the specialist.</p>';

  h += makeTable(
    ['Keystone','1st','2nd','3rd','4th','Boots','Depth','Avg Early','Avg Mid','Avg Full','#1 Wins','Labels','vs AD','vs AP','vs Tanks','vs Squish','Behind','Ahead'],
    sols.map(s => [s.keystone,s['1st'],s['2nd'],s['3rd']||'—',s['4th']||'—',s.boots||'',s.depth||0,
      s.avgEarly||0,s.avgMid||0,s.avgFull||0,
      (s.rank1Count||0)+'/243',(s.labels||[]).join(', ')||'',
      s.vsPhysical||0,s.vsMagic||0,s.vsTanky||0,s.vsSquishy||0,s.whenBehind||0,s.whenAhead||0]),
    [7,8,9,12,13,14,15,16,17]
  );

  const best_overall = sols[0];
  const best_early = [...sols].sort((a,b) => (b.avgEarly||0)-(a.avgEarly||0))[0];
  const best_behind = [...sols].sort((a,b) => (b.whenBehind||0)-(a.whenBehind||0))[0];
  const most_wins = [...sols].sort((a,b) => (b.rank1Count||0)-(a.rank1Count||0))[0];

  h += '<div class="section-title">Quick Insights</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:8px;">';
  [['Best Overall (Full Build)',best_overall],['Best Early Game (2 items)',best_early],['Best from Behind',best_behind],['Most #1 Finishes',most_wins]].forEach(([title,s]) => {
    if (!s) return;
    h += `<div style="background:#16162a;border:1px solid #2a2a5e;border-radius:8px;padding:14px;">
      <div style="font-size:11px;color:#7c6ef0;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">${title}</div>
      <div style="color:#e8e8ff;font-weight:700;font-size:14px;">${s.keystone}</div>
      <div style="color:#aab;font-size:12px;margin-top:4px;">${s['1st']} → ${s['2nd']} → ${s['3rd']||'—'} → ${s['4th']||'—'}</div>
      <div style="color:#888;font-size:11px;margin-top:6px;">Early: ${wpaFmt(s.avgEarly)} &bull; Mid: ${wpaFmt(s.avgMid)} &bull; Full: ${wpaFmt(s.avgFull)} &bull; #1 wins: ${s.rank1Count}/243</div>
    </div>`;
  });
  h += '</div>';
  return h;
}

function renderSolver() {
  let h = '<div class="dims">';
  for (const [d,cfg] of Object.entries(DIMS)) { h+=`<div class="dim-group"><label>${cfg.label}</label><div class="dim-options">`; cfg.options.forEach(o => { h+=`<button class="pill${state.filters[d]===o?' active':''}" onclick="setFilter('${d}','${o}')">${o}</button>`; }); h+='</div></div>'; }
  h += '</div>';
  h += '<div class="dims"><div class="dim-group"><label>Rank Builds By</label><div class="dim-options">';
  [['earlyScore','Early (2 items)'],['midScore','Mid (3 items)'],['fullScore','Full Build']].forEach(([k,l]) => { h+=`<button class="pill${state.sortBy===k?' active':''}" onclick="setSortBy('${k}')">${l}</button>`; });
  h += '</div></div></div>';

  let rows = (DATA.solver||[]).filter(r => r.damage===state.filters.damage&&r.tankiness===state.filters.tankiness&&r.cc===state.filters.cc&&r.state===state.filters.state&&r.gold===state.filters.gold);
  rows = [...rows].sort((a,b) => (b[state.sortBy]||0)-(a[state.sortBy]||0));
  rows.forEach((r,i) => r._r=i+1);

  h += `<div class="count">${rows.length} builds &bull; Sorted by ${state.sortBy==='earlyScore'?'Early (2-item spike)':state.sortBy==='midScore'?'Mid (3 items)':'Full Build'}</div>`;
  h += makeTable(['#','Keystone','Starter','Boots','1st','2nd','3rd','4th','Depth','Early','Mid','Full','Cond','Sit','Runes'],
    rows.map(r => [r._r,r.keystone,r.starter,r.boots,r['1st'],r['2nd'],r['3rd']||'—',r['4th']||'—',r.depth||0,r.earlyScore||0,r.midScore||0,r.fullScore||0,r.conditionalWPA||0,r.situationalWPA||0,r.runeAdj||0]),
    [9,10,11,12,13,14]);
  return h;
}

function renderArchetypes() {
  const rows = [];
  for (const [ks,d] of Object.entries(DATA.explorer?.perKeystone||{}))
    for (const a of d.archetypes||[])
      rows.push([ks,a.legendaryAdjWPA,a['1st']?.name,a['1st']?.adjWpa,a['1st']?.games,a['2nd']?.name,a['2nd']?.adjWpa,a['2nd']?.games,a['3rd_options']?.[0]?.name||'—',a['4th_options']?.[0]?.name||'—',a.boots_options?.[0]?.name||'',a.starter_options?.[0]?.name||'']);
  rows.sort((a,b) => b[1]-a[1]);
  return '<div class="section-title">Build Archetypes</div>' + makeTable(['Keystone','Leg WPA','1st','1st Adj','Games','2nd','2nd Adj','Games','3rd','4th','Boots','Starter'],rows,[1,3,6]);
}

function renderRunes() {
  const rows = [];
  for (const [ks,d] of Object.entries(DATA.explorer?.perKeystone||{}))
    for (const p of d.allRunePages||[])
      rows.push([p.keystone?.name||ks,p.primaryTree,p.primaryRunes?.[0]?.name||'',p.primaryRunes?.[1]?.name||'',p.primaryRunes?.[2]?.name||'',p.secondaryTree,p.secondaryRunes?.[0]?.name||'',p.secondaryRunes?.[1]?.name||'',p.totalAdjWPA]);
  rows.sort((a,b) => b[8]-a[8]);
  return '<div class="section-title">Rune Pages</div>' + makeTable(['Keystone','Primary','Row 1','Row 2','Row 3','Secondary','Sec 1','Sec 2','Adj WPA'],rows,[8]);
}

function renderItems() {
  let h = '';
  for (const [tn,items] of Object.entries(DATA.scraper?.global||{})) {
    if (tn==='Spells') continue;
    const s = [...items].sort((a,b) => (b.wpaOverall||0)-(a.wpaOverall||0));
    h += `<div class="section-title">${tn} (${items.length})</div>`;
    h += makeTable(['Item','WPA','Buys','Pick %','Pre-Buy WP','Win Rate','Bias'],
      s.map(i => [iN(i.itemId),Math.round((i.wpaOverall||0)*100)/100,i.occurrence||0,Math.round((i.occurrenceRelative||0)*100)/100,Math.round((i.winrateExpected||0)*10)/10,Math.round((i.winrateObserved||0)*10)/10,Math.round((i.bias||0)*1000)/1000]),[1]);
  }
  return h;
}

function renderSpells() {
  let h = '';
  const top = (DATA.explorer?.spells||[]).slice().sort((a,b) => b.wpa-a.wpa);
  h += '<div class="section-title">Top Summoner Spells</div>';
  if (top.length) h += makeTable(['Spell','WPA','Games'],top.map(s => [s.name,s.wpa,s.games]),[1]);
  const all = (DATA.scraper?.global?.Spells||[]).slice().sort((a,b) => (b.wpaOverall||0)-(a.wpaOverall||0));
  if (all.length) {
    h += '<div class="section-title">All Spells — Full Data</div>';
    h += makeTable(['Spell','WPA','Games','Pick %','Pre-Buy WP','Win Rate'],
      all.map(s => [sN(s.summonerSpell),Math.round((s.wpaOverall||0)*100)/100,s.occurrence||0,Math.round((s.occurrenceRelative||0)*100)/100,Math.round((s.winrateExpected||0)*10)/10,Math.round((s.winrateObserved||0)*10)/10]),[1]);
  }
  return h;
}

function renderGuide() {
  const all = DATA.explorer?.conditionalData||[];
  if (!all.length) return '<p style="color:#6666aa;margin:16px 0;">No guide data. Re-run toolkit.</p>';
  const keystones = [...new Set(all.map(r => r.keystone))].sort();
  const slotOrder = ['Starter','Boots','1st Legendary','2nd Legendary','3rd Legendary','4th+ Legendary'];
  const slots = ['All',...slotOrder.filter(s => all.some(r => r.slot===s))];
  if (!state.guideKeystone||!keystones.includes(state.guideKeystone)) state.guideKeystone = keystones[0];

  let h = '<div class="section-title">Step-by-Step Build Guide</div>';
  h += '<div class="dims"><div class="dim-group"><label>Keystone</label><div class="dim-options">';
  keystones.forEach(ks => { h+=`<button class="pill${state.guideKeystone===ks?' active':''}" onclick="setGuideFilter('guideKeystone','${ks.replace(/'/g,"\\'")}')">${ks}</button>`; });
  h += '</div></div><div class="dim-group"><label>Slot</label><div class="dim-options">';
  slots.forEach(sl => { h+=`<button class="pill${state.guideSlot===sl?' active':''}" onclick="setGuideFilter('guideSlot','${sl.replace(/'/g,"\\'")}')">${sl}</button>`; });
  h += '</div></div></div>';

  let filtered = all.filter(r => r.keystone===state.guideKeystone);
  if (state.guideSlot!=='All') filtered = filtered.filter(r => r.slot===state.guideSlot);
  h += `<div class="count">${filtered.length} items</div>`;
  h += makeTable(['Slot','Condition','Item','Adj WPA','Raw WPA','Games','Pick %','Win %','Pre-Buy WP'],
    filtered.map(r => [r.slot,r.condition,r.name,r.adjWpa,r.rawWpa,r.games,Math.round((r.pickRate||0)*10)/10,Math.round((r.winRate||0)*10)/10,Math.round((r.preBuyWP||0)*10)/10]),[3,4]);
  return h;
}

function loadFile(e) {
  const f = e.target.files?.[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      let t = r.result;
      t = t.replace(/\bNaN\b/g,'null').replace(/\b-Infinity\b/g,'null').replace(/\bInfinity\b/g,'null');
      DATA = JSON.parse(t);
      buildNames();
      state.sort = {col:null,dir:'desc'}; state.guideKeystone=null; state.guideSlot='All';
      render();
    } catch(e) { alert('Error: '+e.message); }
  };
  r.readAsText(f);
}
render();
</script>
{% endraw %}
